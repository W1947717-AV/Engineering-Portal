{% extends 'base.html' %}

{% block content %}

<div class="section-title">Delete Meeting</div>

<div class="container pb-5">
    <div class="card p-4 shadow-sm" style="border-radius: 10px;">
        <h3>Are you sure you want to delete this meeting?</h3>

        <p><strong>Title:</strong> {{ meeting.title }}</p>
        <p><strong>Team:</strong> {{ meeting.team.name }}</p>
        <p><strong>Date:</strong> {{ meeting.date }}</p>
        <p><strong>Time:</strong> {{ meeting.time }}</p>

        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="/schedule/" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</div>

{% endblock %}
