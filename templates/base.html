<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f5f5;
            font-family: Arial, sans-serif;
        }

        .page-wrapper {
            max-width: 1400px;
            margin: 20px auto;
            background: white;
            min-height: 95vh;
            box-shadow: 0 0 10px rgba(0,0,0,0.08);
        }

        .top-header {
            padding: 30px 40px 20px 40px;
        }

        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .profile-section,
        .logout-section {
            width: 160px;
            text-align: center;
            color: #222;
            font-size: 20px;
        }

        .profile-icon,
        .logout-icon {
            font-size: 48px;
            line-height: 1;
        }

        .portal-center {
            flex: 1;
            text-align: center;
        }

        .portal-brand {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 18px;
            margin-bottom: 18px;
        }

        .portal-logo-box {
            width: 70px;
            height: 50px;
            border: 2px solid #444;
            position: relative;
        }

        .portal-logo-box::before,
        .portal-logo-box::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            border-top: 2px solid #444;
        }

        .portal-logo-box::before {
            transform: rotate(35deg);
        }

        .portal-logo-box::after {
            transform: rotate(-35deg);
        }

        .portal-title {
            font-size: 46px;
            font-weight: 400;
            margin: 0;
        }

        .search-bar-wrap {
            display: flex;
            justify-content: center;
        }

        .search-form {
            width: 430px;
            position: relative;
        }

        .search-form input {
            width: 100%;
            border-radius: 28px;
            border: 1px solid #ccc;
            padding: 12px 46px 12px 20px;
            font-size: 15px;
        }

        .search-form button {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            font-size: 18px;
        }

        .top-divider {
            border-top: 3px solid #222;
            margin-top: 18px;
        }

        .main-nav {
            text-align: center;
            padding: 18px 20px 28px;
        }

        .dashboard-btn {
            display: inline-block;
            border: 2px solid #222;
            padding: 5px 20px;
            background: #fff;
            font-weight: 700;
            margin-bottom: 18px;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 26px;
            flex-wrap: wrap;
        }

        .nav-pill {
            border: 2px solid #222;
            background: white;
            padding: 6px 22px;
            text-decoration: none;
            color: #111;
            font-weight: 600;
            min-width: 120px;
            display: inline-block;
            text-align: center;
        }

        .nav-pill:hover {
            background: #f2f2f2;
            color: #111;
        }

        .nav-separator {
            width: 12px;
            height: 42px;
            background: #ddd;
            border-radius: 999px;
        }

        .section-title {
            background: linear-gradient(90deg, #f3e8ff, #eaf2ff);
            text-align: center;
            font-size: 28px;
            padding: 14px 10px;
            margin-bottom: 30px;
            font-weight: 700;
            border-bottom: 1px solid #e5e5e5;
        }

        .footer-bar {
            margin-top: 50px;
            background: #d9d9d9;
            padding: 18px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
        }

        .footer-links a {
            color: #111;
            margin-left: 30px;
            font-weight: 700;
        }

        .badge {
            padding: 6px 10px;
            font-size: 0.85rem;
            border-radius: 6px;
        }

        .dependency-pill {
            display: inline-block;
            padding: 6px 12px;
            margin: 4px 6px 4px 0;
            border: 1px solid #555;
            border-radius: 20px;
            text-decoration: none;
            color: #222;
            background: #f1f1f1;
            font-size: 0.9rem;
        }

        .dependency-pill:hover {
            background: #222;
            color: white;
        }

        .member-card {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 10px;
            background: #f9f9f9;
            text-align: center;
        }

        .member-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .member-role {
            font-size: 0.8rem;
            color: #666;
        }

        .message-sidebar {
            background: #d9d9d9;
            border-radius: 10px;
            padding: 25px 15px;
        }

        .message-side-btn {
            display: block;
            background: white;
            border: 1px solid #444;
            color: #111;
            text-decoration: none;
            text-align: center;
            padding: 15px 10px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .message-side-btn.active {
            background: #999;
        }

        .message-panel {
            border: 1px solid #444;
            background: #d9d9d9;
            padding: 20px;
        }

        .message-card {
            display: block;
            background: white;
            border: 1px solid #777;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            color: #111;
            text-decoration: none;
        }

        .message-card:hover {
            background: #f2f2f2;
        }

        .schedule-sidebar {
            background: #d9d9d9;
            border-radius: 10px;
            padding: 25px 15px;
        }

        .schedule-side-btn {
            display: block;
            background: white;
            border: 1px solid #444;
            color: #111;
            text-decoration: none;
            text-align: center;
            padding: 15px 10px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .schedule-side-btn.active {
            background: #999;
        }

        .schedule-panel {
            border: 1px solid #444;
            background: #d9d9d9;
            padding: 20px;
        }

        .schedule-card {
            background: white;
            border: 1px solid #777;
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 14px;
        }

        .schedule-status {
            padding: 8px 10px;
            border-radius: 6px;
            font-weight: 600;
            margin-top: 10px;
        }

        .schedule-status.pending {
            background: #fff3cd;
            color: #664d03;
            border: 1px solid #ffecb5;
        }

        .schedule-status.accepted {
            background: #d1e7dd;
            color: #0f5132;
            border: 1px solid #badbcc;
        }

        .schedule-status.declined {
            background: #f8d7da;
            color: #842029;
            border: 1px solid #f5c2c7;
        }

        .schedule-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .schedule-badge-pending {
            background: #fff3cd;
            color: #664d03;
            border: 1px solid #ffecb5;
        }

        .schedule-badge-accepted {
            background: #d1e7dd;
            color: #0f5132;
            border: 1px solid #badbcc;
        }

        .schedule-badge-declined {
            background: #f8d7da;
            color: #842029;
            border: 1px solid #f5c2c7;
        }

        .schedule-info-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin-top: 14px;
        }

        .schedule-info-grid div {
            background: #f8f8f8;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px;
        }

        .schedule-info-grid strong {
            display: block;
            font-size: 0.8rem;
            color: #555;
            margin-bottom: 4px;
        }

        .schedule-info-grid span {
            font-weight: 600;
        }

        .department-card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 22px;
            min-height: 230px;
        }

        .department-card h3 {
            font-weight: 700;
            margin-bottom: 18px;
        }

        .dependency-block {
            background: #f8f8f8;
            border-left: 4px solid #d9d9d9;
            padding: 10px 12px;
            border-radius: 8px;
        }

        .dependency-icon {
            display: inline-flex;
            width: 24px;
            height: 24px;
            border: 1px solid #999;
            border-radius: 50%;
            align-items: center;
            justify-content: center;
            margin-right: 6px;
            font-weight: bold;
            color: #555;
        }

                .org-structure-wrapper {
            background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
            border: 1px solid #e5e5e5;
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.05);
        }

        .org-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 22px;
        }

        .org-header h1 {
            font-size: 34px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .org-header p {
            color: #555;
            margin: 0;
        }

        .org-hint {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 12px 18px;
            color: #666;
            background: #fff;
        }

        .org-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .org-controls button {
            border: 1px solid #ddd;
            background: #fff;
            padding: 8px 14px;
            border-radius: 8px;
            font-weight: 600;
        }

        .org-chart {
            position: relative;
            text-align: center;
            padding-top: 10px;
        }

        .org-root-card {
            width: 270px;
            margin: 0 auto 38px auto;
            background: #fff;
            border-radius: 14px;
            padding: 20px;
            border-top: 5px solid #6f42c1;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
        }

        .org-root-icon {
            width: 60px;
            height: 60px;
            background: #6f42c1;
            color: white;
            border-radius: 50%;
            margin: 0 auto 12px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
        }

        .org-root-card h3 {
            font-weight: 700;
            margin-bottom: 6px;
        }

        .org-root-card p {
            color: #666;
            margin: 0;
        }

        .org-lines {
            height: 42px;
            width: 75%;
            margin: 0 auto;
            border-top: 2px solid #9ca3af;
            border-left: 2px solid #9ca3af;
            border-right: 2px solid #9ca3af;
            position: relative;
        }

        .org-lines::before {
            content: "";
            position: absolute;
            top: -42px;
            left: 50%;
            height: 42px;
            border-left: 2px solid #9ca3af;
        }

        .org-departments {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 28px;
            margin-top: 0;
        }

        .org-dept-card {
            background: white;
            border-radius: 14px;
            padding: 24px 18px;
            text-decoration: none;
            color: #111;
            box-shadow: 0 6px 16px rgba(0,0,0,0.07);
            border: 1px solid #eee;
            border-top: 5px solid #999;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .org-dept-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 22px rgba(0,0,0,0.1);
            color: #111;
        }

        .org-dept-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 14px auto;
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            background: #777;
        }

        .org-dept-card h3 {
            font-weight: 700;
            margin-bottom: 10px;
        }

        .org-dept-card p {
            color: #555;
            min-height: 60px;
        }

        .org-view-link {
            display: inline-block;
            font-weight: 700;
            margin-top: 8px;
        }

        .org-team-groups {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 28px;
            margin-top: 28px;
        }

        .org-team-group {
            border-radius: 12px;
            padding: 18px;
            text-align: left;
            border: 1px solid #eee;
        }

        .org-team-group div {
            margin-bottom: 10px;
            color: #444;
        }

        .dept-engineering,
        .department-row-engineering {
            border-color: #0d6efd;
        }

        .dept-engineering .org-dept-icon,
        .department-row-engineering .department-row-icon {
            background: #0d6efd;
        }

        .dept-engineering h3,
        .dept-engineering .org-view-link,
        .department-row-engineering h3,
        .department-row-engineering .department-row-action a {
            color: #0d6efd;
        }

        .group-engineering {
            background: #eef6ff;
            border-color: #cfe5ff;
        }

        .dept-design,
        .department-row-design {
            border-color: #6f42c1;
        }

        .dept-design .org-dept-icon,
        .department-row-design .department-row-icon {
            background: #6f42c1;
        }

        .dept-design h3,
        .dept-design .org-view-link,
        .department-row-design h3,
        .department-row-design .department-row-action a {
            color: #6f42c1;
        }

        .group-design {
            background: #f6f0ff;
            border-color: #e6d8ff;
        }

        .dept-product,
        .department-row-product {
            border-color: #198754;
        }

        .dept-product .org-dept-icon,
        .department-row-product .department-row-icon {
            background: #198754;
        }

        .dept-product h3,
        .dept-product .org-view-link,
        .department-row-product h3,
        .department-row-product .department-row-action a {
            color: #198754;
        }

        .group-product {
            background: #f0faf4;
            border-color: #d4f1df;
        }

        .dept-growth-marketing,
        .department-row-growth-marketing {
            border-color: #fd7e14;
        }

        .dept-growth-marketing .org-dept-icon,
        .department-row-growth-marketing .department-row-icon {
            background: #fd7e14;
        }

        .dept-growth-marketing h3,
        .dept-growth-marketing .org-view-link,
        .department-row-growth-marketing h3,
        .department-row-growth-marketing .department-row-action a {
            color: #fd7e14;
        }

        .group-growth-marketing {
            background: #fff5eb;
            border-color: #ffe0bf;
        }

        .department-list-header {
            display: flex;
            gap: 14px;
            align-items: center;
            margin-bottom: 24px;
        }

        .department-list-icon {
            width: 52px;
            height: 52px;
            background: #f1ecff;
            color: #6f42c1;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .department-list-header h2 {
            margin: 0;
            font-weight: 700;
        }

        .department-list-header p {
            margin: 0;
            color: #666;
        }

        .department-list {
            display: grid;
            gap: 18px;
        }

        .department-row {
            display: grid;
            grid-template-columns: 80px 1fr 160px 220px;
            align-items: center;
            gap: 20px;
            background: white;
            border: 1px solid #eee;
            border-left: 5px solid #999;
            border-radius: 14px;
            padding: 22px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.05);
        }

        .department-row-icon {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: #777;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
        }

        .department-row-main h3 {
            font-weight: 700;
            margin-bottom: 8px;
        }

        .department-row-main p {
            margin: 0;
            color: #555;
        }

        .department-row-count {
            color: #555;
            font-weight: 600;
        }

        .department-row-action a {
            display: block;
            border: 1px solid currentColor;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
        }

        .org-footer-note {
            text-align: center;
            margin-top: 28px;
            color: #666;
            border: 1px solid #ddd;
            background: #fff;
            border-radius: 10px;
            padding: 12px;
        }

        @media (max-width: 1000px) {
            .org-departments,
            .org-team-groups {
                grid-template-columns: repeat(2, 1fr);
            }

            .department-row {
                grid-template-columns: 70px 1fr;
            }

            .department-row-count,
            .department-row-action {
                grid-column: 2;
            }
        }

        .dashboard-welcome {
            background: white;
            border: 1px solid #ddd;
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.05);
        }

        .dashboard-welcome h2 {
            font-weight: 700;
            margin-bottom: 6px;
        }

        .dashboard-welcome p {
            margin: 0;
            color: #666;
        }

        .dashboard-card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 14px;
            padding: 22px;
            min-height: 260px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.05);
        }

        .dashboard-card h3 {
            font-weight: 700;
            margin-bottom: 18px;
        }

        .dashboard-list-item {
            border-bottom: 1px solid #eee;
            padding: 10px 0;
        }

        .dashboard-list-item:last-child {
            border-bottom: none;
        }

        .dashboard-list-item span {
            color: #666;
        }

        .dashboard-request {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            align-items: center;
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 12px;
            background: #f9f9f9;
        }

        .dashboard-request span {
            color: #666;
        }

        .dashboard-request-actions {
            display: flex;
            gap: 8px;
        }

        .dashboard-message {
            display: block;
            color: #111;

            border-bottom: 1px solid #eee;
            padding: 10px 0;
        }

        .dashboard-message:hover {

        .dashboard-message p {
            margin: 6px 0 0 0;

        .dashboard-badge {

        .badge-new {

        }

        .recurrence-badge {

        .dashboard-title-bar {

        .dashboard-page {

        .dashboard-hero-icon {

        .dashboard-welcome h2 {

        .dashboard-card-heading {

        .dashboard-card-yellow {

        }

        .dashboard-card-purple {
            border-top: 4px solid #6f42c1;
        }

            border-top: 4px solid #198754;

            border-bottom: 1px solid #eee;

        .dashboard-list-item:last-child {
            border-bottom: none;
        }
