<!DOCTYPE html>
<html>
<head>
    <title>Reset Password - Engineering Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f5f5; font-family: Arial, sans-serif; }
        .wrapper { max-width: 480px; margin: 80px auto; background: white; padding: 35px; border-radius: 16px; box-shadow: 0 6px 18px rgba(0,0,0,0.08); text-align: center; }
        .form-control { margin-bottom: 14px; }
    </style>
</head>
<body>
<div class="wrapper">
    <h2>Set New Password</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.new_password1.label_tag }}
        {{ form.new_password1 }}
        {{ form.new_password2.label_tag }}
        {{ form.new_password2 }}
        <button type="submit" class="btn btn-dark w-100 mt-3">Set Password</button>
    </form>
</div>
</body>
</html>
