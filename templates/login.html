<!DOCTYPE html>
<html>
<head>
    <title>Login - Engineering Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f5f5;
            font-family: Arial, sans-serif;
        }

        .login-wrapper {
            max-width: 480px;
            margin: 90px auto;
            background: white;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
            text-align: center;
        }

        .portal-logo-box {
            width: 70px;
            height: 50px;
            border: 2px solid #444;
            position: relative;
            margin: 0 auto 15px;
        }

        .portal-logo-box::before,
        .portal-logo-box::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            border-top: 2px solid #444;
        }

        .portal-logo-box::before {
            transform: rotate(35deg);
        }

        .portal-logo-box::after {
            transform: rotate(-35deg);
        }

        .login-title {
            font-size: 32px;
            margin-bottom: 5px;
        }

        .login-subtitle {
            color: #666;
            margin-bottom: 25px;
        }

        .form-control {
            margin-bottom: 15px;
        }

        .login-btn {
            width: 100%;
            padding: 10px;
        }

        .error-box {
            background: #f8d7da;
            color: #842029;
            border: 1px solid #f5c2c7;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="login-wrapper">
    {% load static %}

    <img 
        src="{% static 'teams/team_logos/sky_logo.png' %}" 
        alt="Sky Logo"
        style="height:55px; margin-bottom:15px;"
    >

    <h1 class="login-title">Engineering Portal</h1>
    <p class="login-subtitle">Sign in to continue</p>

    {% if form.errors %}
        <div class="error-box">
            Invalid username or password.
        </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" class="form-control" placeholder="Username" required>
        <input type="password" name="password" class="form-control" placeholder="Password" required>

        <button type="submit" class="btn btn-dark login-btn">Login</button>
    </form>

    <p class="mt-3">
    Don't have an account? <a href="/register/">Register</a>
    </p>
    <p>
        <a href="/forgot-password/">Forgot your password?</a>
    </p>
</div>

</body>
</html>
