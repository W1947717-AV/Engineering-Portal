<!DOCTYPE html>
<html>
<head>
    <title>Change Password - Engineering Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f5f5; font-family: Arial, sans-serif; }
        .pw-wrapper {
            max-width: 480px;
            margin: 60px auto;
            background: white;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
        }
        .form-control { margin-bottom: 14px; }
    </style>
</head>
<body>
<div class="pw-wrapper">
    <h2 style="margin-bottom:5px;">Change Password</h2>
    <p style="color:#666; margin-bottom:25px;">Enter your current password to set a new one.</p>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <label>Current Password</label>
        <input type="password" name="current_password" class="form-control" required>

        <label>New Password</label>
        <input type="password" name="new_password" class="form-control" required>

        <label>Confirm New Password</label>
        <input type="password" name="confirm_password" class="form-control" required>

        <button type="submit" class="btn btn-dark w-100">Change Password</button>
    </form>

    <a href="/profile/" class="btn btn-link w-100 mt-2">Back to Profile</a>
</div>
</body>
</html>
