<!DOCTYPE html>
<html>
<head>
    <title>Register - Engineering Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f5f5;
            font-family: Arial, sans-serif;
        }

        .register-wrapper {
            max-width: 500px;
            margin: 80px auto;
            background: white;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
            text-align: center;
        }

        .portal-logo-box {
            width: 70px;
            height: 50px;
            border: 2px solid #444;
            position: relative;
            margin: 0 auto 15px;
        }

        .portal-logo-box::before,
        .portal-logo-box::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            border-top: 2px solid #444;
        }

        .portal-logo-box::before {
            transform: rotate(35deg);
        }

        .portal-logo-box::after {
            transform: rotate(-35deg);
        }

        .register-title {
            font-size: 30px;
            margin-bottom: 10px;
        }

        .register-subtitle {
            color: #666;
            margin-bottom: 25px;
        }

        .form-control {
            margin-bottom: 12px;
        }

        .btn-register {
            width: 100%;
            padding: 10px;
        }

        .error-box {
            background: #f8d7da;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            color: #842029;
            border: 1px solid #f5c2c7;
        }
    </style>
</head>
<body>

<div class="register-wrapper">
    {% load static %}

    <img 
        src="{% static 'teams/team_logos/sky_logo.png' %}" 
        alt="Sky Logo"
        style="height:55px; margin-bottom:15px;"
    >

    <h2 class="register-title">Create Account</h2>
    <p class="register-subtitle">Register for Engineering Portal</p>

    {% if messages %}
        {% for message in messages %}
            <div class="error-box">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="first_name" class="form-control" placeholder="First Name" required>
        <input type="text" name="last_name" class="form-control" placeholder="Last Name" required>
        <input type="text" name="username" class="form-control" placeholder="Username" required>
        <input type="email" name="email" class="form-control" placeholder="Email Address" required>
        <input type="password" name="password" class="form-control" placeholder="Password" required>
        <input type="password" name="confirm_password" class="form-control" placeholder="Confirm Password" required>

        <button type="submit" class="btn btn-dark btn-register">Register</button>
    </form>

    <p class="mt-3">
        Already have an account? <a href="/login/">Login</a>
    </p>
</div>

</body>
</html>
