<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password - Engineering Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f5f5; font-family: Arial, sans-serif; }
        .wrapper { max-width: 480px; margin: 80px auto; background: white; padding: 35px; border-radius: 16px; box-shadow: 0 6px 18px rgba(0,0,0,0.08); text-align: center; }
        .form-control { margin-bottom: 14px; }
    </style>
</head>
<body>
<div class="wrapper">
    <h2>Forgot Password</h2>
    <p style="color:#666; margin-bottom:25px;">Enter your email address and we'll send you a reset link.</p>
    <form method="POST">
        {% csrf_token %}
        <input type="email" name="email" class="form-control" placeholder="Email Address" required>
        <button type="submit" class="btn btn-dark w-100">Send Reset Link</button>
    </form>
    <a href="/login/" class="btn btn-link w-100 mt-2">Back to Login</a>
</div>
</body>
</html>
