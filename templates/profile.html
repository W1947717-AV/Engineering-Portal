<!DOCTYPE html>
<html>
<head>
    <title>Profile - Engineering Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f5f5; font-family: Arial, sans-serif; }
        .profile-wrapper {
            max-width: 540px;
            margin: 60px auto;
            background: white;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
        }
        .form-control { margin-bottom: 14px; }
    </style>
</head>
<body>
<div class="profile-wrapper">
    <h2 style="margin-bottom:5px;">My Profile</h2>
    <p style="color:#666; margin-bottom:25px;">Update your account details below.</p>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <label>First Name</label>
        <input type="text" name="first_name" class="form-control"
               value="{{ request.user.first_name }}" required>

        <label>Last Name</label>
        <input type="text" name="last_name" class="form-control"
               value="{{ request.user.last_name }}" required>

        <label>Email</label>
        <input type="email" name="email" class="form-control"
               value="{{ request.user.email }}">

        <label>Username</label>
        <input type="text" class="form-control"
               value="{{ request.user.username }}" disabled>
        <small class="text-muted d-block mb-3">Username cannot be changed.</small>

        <button type="submit" class="btn btn-dark w-100">Save Changes</button>
    </form>

    <hr>
    <a href="/change-password/" class="btn btn-outline-secondary w-100">Change Password</a>
    <a href="/dashboard/" class="btn btn-link w-100 mt-2">Back to Dashboard</a>
</div>
</body>
</html>
