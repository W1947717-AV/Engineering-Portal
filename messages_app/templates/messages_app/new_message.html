{% extends 'base.html' %}

{% block content %}

<div class="section-title messages-title-bar">💬 Messages</div>

<div class="container pb-5 messages-page">
    <div class="row g-4">

        <div class="col-md-3">
            <div class="messages-sidebar-modern">
                <a href="/messages/new/" class="messages-side-modern primary active">✎ New Message</a>
                <a href="/messages/" class="messages-side-modern">📥 Inbox</a>
                <a href="/messages/sent/" class="messages-side-modern">✈ Sent</a>
                <a href="/messages/drafts/" class="messages-side-modern">📄 Drafts</a>
            </div>
        </div>

        <div class="col-md-9">
            <div class="messages-panel-modern">
                <div class="messages-panel-heading">
                    <span class="messages-icon">✎</span>
                    <h2>New Message</h2>
                </div>

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">To</label>
                        <select name="recipient" class="form-control" required>
                            <option value="">Select user</option>
                            {% for user in users %}
                                <option value="{{ user.id }}">
                                    {% if user.first_name or user.last_name %}
                                        {{ user.first_name }} {{ user.last_name }}
                                    {% else %}
                                        {{ user.username }}
                                    {% endif %}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Subject</label>
                        <input type="text" name="subject" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Message</label>
                        <textarea name="body" class="form-control" rows="8" required></textarea>
                    </div>

                    <button type="submit" name="send" class="btn messages-send-btn">Send Message</button>
                    <button type="submit" name="draft" class="btn messages-draft-btn">Save Draft</button>
                </form>
            </div>
        </div>

    </div>
</div>

{% endblock %}
