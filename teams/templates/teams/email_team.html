{% extends 'base.html' %}

{% block content %}

<div class="section-title">Email {{ team.name }}</div>

<div class="container pb-5">
    <div class="card p-4 shadow-sm" style="border-radius: 10px;">

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Subject</label>
                <input type="text" name="subject" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Message</label>
                <textarea name="message" class="form-control" rows="5" required></textarea>
            </div>

            <button type="submit" class="btn btn-dark">Send Email</button>
            <a href="/teams/{{ team.id }}/" class="btn btn-secondary">Cancel</a>
        </form>

    </div>
</div>

{% endblock %}
